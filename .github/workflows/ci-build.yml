name: Build project

on:
  push:
    branches: [ main ]

  schedule:
    - cron: '30 7 * * 1'  # At 07:30 on Monday, every Monday.

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  MAVEN_OPTS: -Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false -Dmaven.wagon.http.retryhandler.count=5 -Dmaven.wagon.httpconnectionManager.ttlSeconds=240

# Cancel running jobs when a new push happens to the same branch as otherwise it will
# tie up too many resources without providing much value.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-arm:
    runs-on: windows-11-arm
    name: windows-arm
    env:
      # Let's limit the amount of ram that is used to unpack rustup as we saw
      # failures sometimes due the fact that not enough memory could be reserved.
      RUSTUP_UNPACK_RAM: 134217728  # Use 128 MiB
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'microsoft'
          architecture: arm64

      - name: Install stable rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v3

      - name: Configuring Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@138b1c783b65ec697d8342918306b7b2db4e88f1
        with:
          arch: arm64

      - name: Install and Setup WinGet
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          
          Install-Module -Name Microsoft.WinGet.Client -Force -Repository PSGallery

          Repair-WinGetPackageManager -Force -Latest
          
          $wingetPath = Get-ChildItem -Path "C:\Program Files\WindowsApps\" -Filter "winget.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          if ($wingetPath) {
              Write-Host "Found winget at: $wingetPath"
              & $wingetPath --version
          }

      - name: Install Ninja and NASM
        run: |
         winget install --id Ninja-build.Ninja --source winget --exact --accept-package-agreements --accept-source-agreements

      # Cache .m2/repository
      - name: Cache Maven packages
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-arm64-maven-cache-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-arm64-maven-cache-

      - name: Build project
        run: ./mvnw.cmd -B -ntp --file pom.xml clean package

      - uses: actions/upload-artifact@v7
        if: ${{ always() }}
        with:
          name: build-windows-jars
          path: |
            **/target/*.jar

      - uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: build-windows-target
          path: |
            **/target/surefire-reports/
            **/hs_err*.log
